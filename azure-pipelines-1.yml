trigger:
- development

pool:
  name: default

variables:
  connectionName: Azure for Students(347bd06a-0f1b-4cac-ad5e-26448c082882)
  appServiceName: TuneQuestLoginMicroservice2
  resourceGroupName: TuneQuest
  buildArtifactName: 'TuneQuest-1.0-SNAPSHOT'

stages:

- stage: SonarCloud
  displayName: 'SonarCloud'
  jobs:
  - job: Build_and_Test
    displayName: 'Build and Test'
    steps:
    - checkout: self
      fetchDepth: 0

    - task: SonarCloudPrepare@3
      inputs:
        SonarQube: 'TuneQuestSonarCloud'
        organization: 'i494329'
        scannerMode: 'other'
        extraProperties: |
          sonar.projectKey=I494329_TuneQuestBackend
          sonar.projectName=TuneQuestBackend
          sonar.coverage.minimumThreshold=80

    - task: Gradle@3
      displayName: 'Gradle Build'
      inputs:
        gradleWrapperFile: 'gradlew'
        tasks: 'build'
        publishJUnitResults: true
        testResultsFiles: '**/build/test-results/test/*.xml'
        codeCoverageToolOption: 'JaCoCo'
        codeCoverageClassFilesDirectories: 'build/classes/java/main/'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'
        sonarQubeRunAnalysis: true
        sqGradlePluginVersionChoice: 'build'
        spotBugsAnalysis: false

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish Code Coverage Results'
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/build/reports/jacoco/test/jacocoTestReport.xml'

    - task: SonarQubePublish@7
      displayName: 'Publish SonarQube Results'
      inputs:
        pollingTimeoutSec: '300'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact: Build'
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/build/libs'
        artifactName: '$(buildArtifactName)'

- stage: Test
  displayName: 'Test'
  jobs:
  - job: Test
    displayName: 'Run Tests'
    steps:
    - task: Gradle@3
      displayName: 'Gradle Test'
      inputs:
        gradleWrapperFile: 'gradlew'
        tasks: 'test'

    # - task: Docker@2
    #   displayName: 'Build Docker Image'
    #   inputs:
    #     command: 'build'
    #     dockerfile: 'Dockerfile'
    #     tags: 'tunequest-backend-login:$(Build.BuildId)'

    # - script: |
    #     docker stop tunequest-backend-login-container || true
    #     docker rm tunequest-backend-login-container || true
    #   displayName: 'Stop and Remove Existing Container'

    # - task: Docker@2
    #   displayName: 'Run Docker Container'
    #   inputs:
    #     command: 'run'
    #     containerName: 'tunequest-backend-login-container'
    #     imageName: 'tunequest-backend-login:$(Build.BuildId)'
    #     ports: '8090:8080'

- stage: Deploy
  displayName: Deploy
  jobs:
  - job: Deploy
    displayName: 'Deploy to Azure App Service'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Build Artifacts'
      inputs:
        buildType: 'current'
        artifactName: '$(buildArtifactName)'
        targetPath: '$(Pipeline.Workspace)/drop'

    - task: AzureWebApp@1
      displayName: 'Azure App Service Deploy: $(appServiceName)'
      inputs:
        azureSubscription: '$(connectionName)'
        appType: 'webAppLinux'
        appName: '$(appServiceName)'
        resourceGroupName: '$(resourceGroupName)'
        package: '$(Pipeline.Workspace)/drop/$(buildArtifactName).jar'